server {
    listen 80 default_server;
    server_name gutafinn.tobtech.se _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name gotland.tobtech.se;

    return 308 https://gutafinn.tobtech.se$request_uri;
}

server {
    listen 80;
    server_name admin.gutafinn.tobtech.se;

    # Passkey admin CMS (gutafinn_cms). Same nginx / port as the public site,
    # selected by Host header. It lives on its own subdomain because it serves
    # its own /api/* at root, which would collide with the public API.
    location / {
        proxy_pass http://cms:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
